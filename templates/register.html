{% extends "base.html" %}
{% block content %}

<div class="box">
	<h1>Register</h1>

    {% if not logged_in %}

        <form action="{{ url_for('register') }}" method="post">

            {{ form.hidden_tag() }}
            {{ form.name }}
            {{ form.email }}
            {{ form.password }}
            {{ form.submit }}

        </form>

    {% else %}
        <p>You are already logged in.</p>
    {% endif %}

</div>

{% endblock %}
