{% extends "base.html" %}
{% block content %}

<div class="box">
	<h1>Register</h1>
    <form action="{{ url_for('register') }}" method="post">

        {{ form.hidden_tag() }}
        {{ form.name }}
        {{ form.email }}
        {{ form.password }}
        {{ form.submit }}

    </form>
</div>

{% endblock %}
